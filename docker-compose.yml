services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Presentation/Dockerfile
    ports:
      - "${BACKEND_PORT:-5000}:80"
    environment:
      - MongoSettings__ConnectionString=${MONGO_CONNECTION_STRING:-mongodb://mongo:27017}
      - MongoSettings__DatabaseName=${MONGO_DATABASE_NAME:-MiniFormDb}
      - AllowedOrigins=${ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      - mongo

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://localhost:5000}
    depends_on:
      - backend

  frontend-dev:
    image: node:20
    working_dir: /app
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=${API_BASE_URL:-http://localhost:5000}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  mongo_data:
