apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: miniformapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: mihaimoon/miniformapp-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: API_BASE_URL
              value: "http://localhost:5000"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: miniformapp
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 80
